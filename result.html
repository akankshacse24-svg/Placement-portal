<!DOCTYPE html>
<html>
<head>
    <title>Quiz Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">

    <!-- Left Menu -->
    <div class="menu-icon" onclick="toggleMenu()">☰</div>

    <div class="logo">Placement Portal</div>

    <!-- Right Profile -->
    <div class="profile-icon" onclick="toggleProfile()">👤</div>

</div>

<!-- Left Dropdown -->
<div id="menuDropdown" class="dropdown-menu">
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/quiz">Quiz</a>
    <a href="/interview">Interview</a>
    <a href="/companies">Companies</a>
    <a href="/resume">Resume Analyzer</a>
    <a href="/performance">Performance</a>
</div>

<!-- Right Profile Dropdown -->
<div id="profileDropdown" class="dropdown-profile">
    <a href="/profile">My Profile</a>
    <a href="/logout">Logout</a>
</div>

<div class="result-box">

<h1>Your Score: {{ score }}/{{ total }}</h1>

<h2>AI Suggestions</h2>

<div class="suggestion">
{{ suggestion }}
</div>

<a href="/dashboard">Back</a>

</div>

</body>
</html>
