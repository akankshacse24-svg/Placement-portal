<!DOCTYPE html>
<html>
<head>
<title>Interview Practice</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">

    <!-- Left Menu -->
    <div class="menu-icon" onclick="toggleMenu()">☰</div>

    <div class="logo">Placement Portal</div>

    <!-- Right Profile -->
    <div class="profile-icon" onclick="toggleProfile()">👤</div>

</div>

<!-- LEFT DROPDOWN -->
<div id="menuDropdown" class="dropdown-menu">
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/quiz">Quiz</a>
    <a href="/interview">Interview</a>
    <a href="/companies">Companies</a>
    <a href="/resume">Resume Analyzer</a>
    <a href="/performance">Performance</a>
</div>

<!-- RIGHT PROFILE DROPDOWN -->
<div id="profileDropdown" class="dropdown-profile">
    <a href="/profile">My Profile</a>
    <a href="/logout">Logout</a>
</div>

<!-- MAIN BOX -->
<div class="box">

<h1>Interview Practice</h1>

{% for q in questions %}

<div class="question-box">

<form action="/check_answer" method="POST">

    <p class="question-title">{{ q[1] }}</p>

    <input type="hidden" name="question" value="{{ q[1] }}">

    <textarea
        name="user_answer"
        rows="6"
        placeholder="Type your answer here..."
        required>
    </textarea>

    <br><br>

    <button type="submit">Get AI Feedback</button>

</form>

</div>

{% endfor %}

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
